[DEFAULT]
VERSION = 1.1.1
SYKNO_PRODUCT = MiRa6024|1A

[MIRA_BGT_SETTINGS]
BGT_REG_PATH_TXT = ./mira/cfg/mira6024_projects/reg_bgt_default.txt
MIRA_REG_LOG_TXT = ./mira/log/mira_reg_log.txt
MIRA_REG_LOG_READABLE_TXT = ./mira/log/mira_reg_readable_log.txt

[MIRA_HOST_SYS_PARAMETER]
MIRA_AQUISITION_CPU_CORE = 1
MIRA_EXTRACTING_CPU_CORE = 2
MIRA_PROCESSING_CPU_CORE = 3
MIRA_PROCESS_PRIO = -20

[MIRA_REMOTE_SETTINGS]
MIRA_TCP_CLIENT_IP = 192.168.188.37
MIRA_TCP_SERVER_IP = 192.168.188.21
MIRA_TCP_CLIENT_PORT = 22
MIRA_SSH_CLIENT_NAME = sykno
MIRA_SSH_CLIENT_PWD = syknoerlangen

[MIRA_SAVE_MEASUREMENT]
MIRA_MEAS_HDF5_FOLDER_PATH = ./mira/meas/hdf5/
MIRA_MEAS_NPY_FOLDER_PATH = ./mira/meas/npy/
MIRA_MEAS_MAT_FOLDER_PATH = ./mira/meas/mat/
MIRA_MEAS_CSV_FOLDER_PATH = ./mira/meas/csv/
MIRA_MEAS_FILENAME = MiRa6024_Measurement
MIRA_MEAS_META_GROUP_NAME = Metadata
MIRA_MEAS_META_SYS_INFO = MiRa_Radar_System_Info
MIRA_MEAS_DATASET_GROUP_NAME = Data
MIRA_MEAS_DATASET_FRAME_NAME = Frame_Data_Cube
MIRA_SESSION_LABEL_NAME = Default_MiRa6024_Session_Label
MIRA_MEASUREMENT_PATH = ./mira/meas/hdf5/
MIRA_MEAS_PROJECT_NAME = Default_MiRa6024_Project

[MIRA_USB_SPI_BRIDGE]
USB_VENDOR_ID = 0x0483
USB_PRODUCT_ID = 0x1337
USB_SPI_BRIDGE_TIMEOUT = 10000
USB_SPI_BRIDGE_DATA_ALLOCATION = 12288

[MIRA_6024_EVAL_GUI]
MIRA_UI_PYQT_FILE_PATH = ./mira/gui/resources/mira_gui_window.ui
MIRA_GUI_COLOR_PALETTE_PATH = ./mira/gui/resources/sykno_qt_dark_palette.json

MIRA_GUI_FPS_RATE = 60
MIRA_GUI_UPS_RATE = 2
MIRA_GUI_FULL_SCREEN = False
MIRA_GUI_START_MAXIMIZED = True
MIRA_GUI_SCREEN_SIZE_MIN = 640, 480
MIRA_PLOT_PEN_WIDTH = 1
MIRA_PLOT_PEN_COSMETIC = True
MIRA_PLOT_TITLE_FONT = 20
MIRA_PLOT_AXIS_LABEL_FONT = 18
MIRA_PLOT_AXIS_NUMBERS_FONT = 18
MIRA_PLOT_AXIS_LABEL_OFFSET = 10

MIRA_PLOT_COLOR_PEN_1 = 173, 216, 230
MIRA_PLOT_COLOR_PEN_2 = 0, 0, 205
MIRA_PLOT_COLOR_PEN_3 = 144, 238, 144
MIRA_PLOT_COLOR_PEN_4 = 0, 128, 0
MIRA_PLOT_COLOR_PEN_5 = 204, 153, 255
MIRA_PLOT_COLOR_PEN_6 = 128, 0, 128
MIRA_PLOT_COLOR_PEN_7 = 255, 200, 0
MIRA_PLOT_COLOR_PEN_8 = 255, 140, 0

MIRA_SHEET_COLOR = 51, 55, 59
MIRA_PLOT_TEXT_COLOR = 210, 210, 210
MIRA_PLOT_BACKGROUND_COLOR = 40, 40, 40
