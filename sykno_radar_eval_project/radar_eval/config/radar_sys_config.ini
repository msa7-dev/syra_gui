[DEFAULT]
VERSION = 1.1.1

MIRA_PRODUCT_NAME_6024 = MiRa6024I1A
MIRA_PRODUCT_NAME_6013 = SY60I13
MIRA_PRODUCT_NAME_6011 = SY60I11

[MIRA_BGT_SETTINGS]
MIRA_SENS_CONF_DIR_PATH = ./radar_eval/config/register_hex_files/
MIRA_REG_LOG_TXT = ./radar_eval/logs/radar_system_register_log.txt
MIRA_REG_LOG_READABLE_TXT = ./radar_eval/logs/radar_system_reggister_readable_log.txt


[AMPLITUDE_LIMITS]
LOWER_MIN =           -50,  -650, -100,  -150, -150, -150, -150, -150
LOWER_MAX =           650,  650,   50,   50,   50,   80,   50,   50
LOWER_VALUE =         150,  -200,  -60,  -60,  36,   40,  -60,  -60
LOWER_TICK_INTERVAL = 1,    1,     2,    2,    2,    2,    2,    2

UPPER_MIN =           550,  0,    -50, -50,   -50, -50, -50, -50
UPPER_MAX =           1250, 1300, 100, 250,   250, 350, 250, 250
UPPER_VALUE =         900,  200,  30,  30,    90,  250,  30,  30
UPPER_TICK_INTERVAL = 1,    1,    2,   2,     2,   2,   2,   2

[MIRA_HOST_SYS_PARAMETER]
MIRA_AQUISITION_CPU_CORE = 0
MIRA_EXTRACTING_CPU_CORE = 1
MIRA_PROCESSING_CPU_CORE = 2
MIRA_PROCESS_PRIO = 0

[MIRA_REMOTE_SETTINGS]
MIRA_TCP_CLIENT_IP = 192.168.188.37
MIRA_TCP_SERVER_IP = 192.168.188.21
MIRA_TCP_CLIENT_PORT = 22
MIRA_SSH_CLIENT_NAME = your_client_name
MIRA_SSH_CLIENT_PWD = your_pwd

[MIRA_SAVE_MEASUREMENT]
MIRA_MEAS_HDF5_FOLDER_PATH = ./radar_eval/measurement/hdf5/
MIRA_MEAS_NPY_FOLDER_PATH = ./radar_eval/measurement/npy/
MIRA_MEAS_MAT_FOLDER_PATH = ./radar_eval/measurement/mat/
MIRA_MEAS_CSV_FOLDER_PATH = ./radar_eval/measurement/csv/
MIRA_MEAS_FILENAME = Measurement
MIRA_MEAS_META_GROUP_NAME = Metadata
MIRA_MEAS_META_SYS_INFO = Radar_System_Info
MIRA_MEAS_DATASET_GROUP_NAME = Data
MIRA_MEAS_DATASET_FRAME_NAME = Frame_Data_Cube
MIRA_MEASUREMENT_PATH = ./radar_eval/measurement/hdf5/
MIRA_MEAS_PROJECT_NAME = Default_
MIRA_SESSION_LABEL_NAME = Default_Session

[MIRA_USB_SPI_BRIDGE]
MIRA_USB_VENDOR_ID = 0x1337
MIRA6024_USB_PRODUCT_ID = 0x6024
MIRA6013_USB_PRODUCT_ID = 0x6013
MIRA6011_USB_PRODUCT_ID = 0x6011
MIRA_ERR_USB_PRODUCT_ID = 0xE404
USB_SPI_BRIDGE_TIMEOUT = 10000
USB_SPI_BRIDGE_DATA_ALLOCATION_SY60I11 = 3072
USB_SPI_BRIDGE_DATA_ALLOCATION_SY60I13 = 6144
USB_SPI_BRIDGE_DATA_ALLOCATION_MiRa6024I1A = 12288

[MIRA_6024_EVAL_GUI]
MIRA_UI_PYQT_FILE_PATH = ./radar_eval/gui/resources/radar_qt_gui_window.ui
MIRA_GUI_COLOR_PALETTE_PATH = ./radar_eval/gui/resources/sykno_qt_dark_palette.json

MIRA_GUI_FPS_RATE = 60
MIRA_GUI_UPS_RATE = 10
MIRA_GUI_FULL_SCREEN = False
MIRA_GUI_START_MAXIMIZED = True
MIRA_GUI_SCREEN_SIZE_MIN = 1280, 720
MIRA_PLOT_PEN_WIDTH = 1
MIRA_PLOT_PEN_COSMETIC = True
MIRA_PLOT_TITLE_FONT = 20
MIRA_PLOT_AXIS_LABEL_FONT = 16
MIRA_PLOT_AXIS_NUMBERS_FONT = 16
MIRA_PLOT_AXIS_LABEL_OFFSET = 10

MIRA_PLOT_COLOR_PEN_1 = 173, 216, 230
MIRA_PLOT_COLOR_PEN_2 = 0, 0, 205
MIRA_PLOT_COLOR_PEN_3 = 144, 238, 144
MIRA_PLOT_COLOR_PEN_4 = 0, 128, 0
MIRA_PLOT_COLOR_PEN_5 = 204, 153, 255
MIRA_PLOT_COLOR_PEN_6 = 128, 0, 128
MIRA_PLOT_COLOR_PEN_7 = 255, 200, 0
MIRA_PLOT_COLOR_PEN_8 = 255, 140, 0

MIRA_SHEET_COLOR = 51, 55, 59
MIRA_PLOT_TEXT_COLOR = 210, 210, 210
MIRA_PLOT_BACKGROUND_COLOR = 40, 40, 40
